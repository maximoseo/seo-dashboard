name: CI — Verify SEO Dashboard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: No committed env files
        run: |
          if git ls-files | grep -E '(^|/)\.env(\.|$|$)' | grep -v 'env.example'; then
            echo "❌ Committed .env file detected"
            exit 1
          fi
      - name: Mock data guard
        run: |
          if grep -rn "mockKeywords\|mockContent\|mockBacklinks\|mockAlerts\|mockCompetitors\|mockPages" src/pages/ --include="*.tsx" | cut -d: -f3- | grep -vE '^[[:space:]]*//'; then
            echo "❌ Mock data found in page components. Mark demo data explicitly or move it behind a demo-state badge."
            exit 1
          fi
          echo "✅ No unlabelled mock data in page components"
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Secret scan
        run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest dir /repo --redact --no-banner

  e2e-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Live smoke against production
        env:
          E2E_BASE_URL: https://seo-dashboard.maximo-seo.ai
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: npm run e2e
